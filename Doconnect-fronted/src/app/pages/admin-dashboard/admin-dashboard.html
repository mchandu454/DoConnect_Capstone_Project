<div class="dashboard-shell">
  <div class="dashboard-container">
  <div class="dashboard-header flex flex-col md:flex-row md:items-start md:justify-between gap-4">
    <div>
      <h2 class="page-title">Admin Dashboard</h2>
      <p class="page-subtitle">Manage questions, moderate answers, and view moderation history.</p>
    </div>
    <div class="header-actions flex flex-col md:flex-row gap-2">
      <a routerLink="/admin/questions">
        <button class="btn btn-primary">Manage Questions</button>
      </a>
      <a routerLink="/admin/answers">
        <button class="btn btn-secondary">Manage Answers</button>
      </a>
      <a routerLink="/admin/history">
        <button class="btn btn-secondary">Moderation History</button>
      </a>
    </div>
  </div>

  <div class="mt-4">
    <div *ngIf="loading" class="state-message">
      Loading questions...
    </div>

    <div *ngIf="!loading && questions.length === 0" class="state-message">
      No questions available yet.
    </div>

    <div *ngIf="!loading && questions.length > 0" class="questions-grid">
      <div class="question-card" *ngFor="let q of questions">
        <div class="question-image-wrapper" *ngIf="q.imagePath">
          <img
            class="question-image"
            [src]="baseUrl + q.imagePath"
            alt="Question image"
            loading="lazy"
            (error)="$event.target.style.display='none'"
          />
        </div>

        <div class="question-content">
          <h3 class="question-title">{{ q.title }}</h3>
          <p class="question-description">
            {{ q.description }}
          </p>

          <div class="question-meta">
            <span class="meta-left">
              Asked by <strong>{{ q.username }}</strong>
            </span>
            <span class="meta-right">
              <span class="meta-date">{{ q.createdDate | date:'medium' }}</span>
              <span class="meta-dot">•</span>
              <span class="meta-badge">{{ q.answerCount }} answers</span>
            </span>
          </div>

          <div class="question-actions">
            <a [routerLink]="['/question-detail', q.questionId]">
              <button class="btn btn-outline">View Details</button>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
